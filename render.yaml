services:
  # Backend: FastAPI
  - type: web
    name: respiratory-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./test.db # Fallback for free tier
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend: React
  - type: web
    name: respiratory-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: respiratory-ai-backend
          property: host
